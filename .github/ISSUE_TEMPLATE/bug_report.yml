name: Bug report
description: Report a reproducible problem in the app, installer, or developer workflow.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please include enough detail for us to reproduce it on a clean machine when possible.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps we can follow.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Installer / Packaging
        - Onboarding / Setup
        - Chat
        - Memory / Workspace
        - Models / Ollama
        - Voice
        - Curator
        - Developer workflow
        - Documentation
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: App version, commit hash, or installer name if known.
      placeholder: v0.1.0 or 58c8b52
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: Include anything useful such as whether Ollama was already installed, whether this was a clean machine, and hardware notes.
  - type: textarea
    id: logs
    attributes:
      label: Screenshots or logs
      description: Paste error text or add screenshots if available.
